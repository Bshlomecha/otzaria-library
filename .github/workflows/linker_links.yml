name: linker links

on:
  workflow_dispatch: 
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        

      - name: Set up Python 
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'  

      - name: update linker links
        run: |
          pip install -r linker/requirements.txt
          python linker/link_all.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Update linker links"
          git push